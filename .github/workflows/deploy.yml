name: Deploy to Cloud

on:
  push:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Extract metadata (tags, labels) for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/securenet || {
              sudo mkdir -p /opt/securenet
              sudo chown $USER:$USER /opt/securenet
              cd /opt/securenet
            }
            
            # Update docker-compose.yml and other config files
            # (In a real scenario, you'd git pull or scp them)
            # For simplicity, we assume the repo is already cloned or we just write the compose file
            
            cat > docker-compose.prod.yml <<EOF
            services:
              postgres:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_USER: securenet
                  POSTGRES_PASSWORD: \${POSTGRES_PASSWORD:-changeme}
                  POSTGRES_DB: securenet
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                networks:
                  - internal
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U securenet"]
                  interval: 5s
                  timeout: 3s
                  retries: 10

              securenet-api:
                image: ghcr.io/${{ github.repository }}-api:master
                restart: unless-stopped
                environment:
                  SECURENET_CONFIG: /etc/securenet/server.toml
                  RUST_LOG: info
                volumes:
                  - ./config/server.toml:/etc/securenet/server.toml:ro
                ports:
                  - "8080:8080"
                depends_on:
                  postgres:
                    condition: service_healthy
                networks:
                  - internal

              securenet-server:
                image: ghcr.io/${{ github.repository }}-server:master
                restart: unless-stopped
                cap_add:
                  - NET_ADMIN
                  - SYS_MODULE
                sysctls:
                  - net.ipv4.ip_forward=1
                environment:
                  SECURENET_CONFIG: /etc/securenet/server.toml
                  RUST_LOG: info
                volumes:
                  - ./config/server.toml:/etc/securenet/server.toml:ro
                ports:
                  - "51820:51820/udp"
                networks:
                  - internal
                devices:
                  - /dev/net/tun:/dev/net/tun
                depends_on:
                  securenet-api:
                    condition: service_healthy

            networks:
              internal:
                driver: bridge

            volumes:
              postgres_data:
            EOF

            # Login to GHCR on the VM
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull and Restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
